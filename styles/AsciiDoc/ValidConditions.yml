---
extends: script
level: error
message: "File contains unbalanced if statements. Review the file to ensure it contains matching opening and closing if statements."
link: https://docs.asciidoctor.org/asciidoc/latest/directives/ifdef-ifndef/
scope: raw
script: |
  text := import("text")
  matches := []

  // clean out multi-line comments
  scope = text.re_replace("(?s) *(\n////.*?////\n)", scope, "")
  //add a newline, it might be missing
  scope += "\n"

  if_regex := "^ifdef::.+\\[\\]"
  ifn_regex := "^ifndef::.+\\[\\]"
  ifeval_regex := "^ifeval::\\[.+\\]"
  endif_regex := "^endif::.*\\[\\]"

  pos := 0
  for line in text.split(scope, "\n") {
    // trim trailing whitespace
    trimmed := text.trim_space(line)
    if text.re_match(if_regex, trimmed) || text.re_match(ifn_regex, trimmed) || text.re_match(ifeval_regex, trimmed) {
      matches = append(matches, {begin: pos, end: pos + len(line)})
    } else if text.re_match(endif_regex, trimmed) {
      if len(matches) > 0 {
        //remove the most recently added open ifdef match
        matches = matches[:len(matches)-1]
      } else if len(matches) == 0 {
        //add orphan endif::[] statements
        matches = append(matches, {begin: pos, end: pos + len(line)})
      }
    }
    pos += len(line) + 1
  }
